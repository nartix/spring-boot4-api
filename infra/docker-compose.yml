services:
  vault-agent:
    image: hashicorp/vault:1.21.4
    container_name: vault-springboot4-dev
    # user: root
    environment:
      VAULT_ADDR: ${VAULT_ADDR:-https://vault.iamdb.net}
      APPROLE_NAME: ${VAULT_APPROLE_NAME:-springboot-dev-role}
      WRAP_TTL: ${VAULT_WRAP_TTL:-5m}
      SKIP_SETCAP: 'true'
    volumes:
      - ./config/agent.hcl:/etc/vault/agent.hcl
      - ./config/dev/config.ctmpl:/etc/vault/templates/config.ctmpl
      - vault-springboot4-dev-secrets:/secrets
      - ${VAULT_BOOTSTRAP_TOKEN_FILE:-/home/feroz/vault/springboot/dev/bootstrap_token}:/etc/vault/bootstrap_token:ro
    entrypoint:
      - /bin/sh
      - -ec
      - |
        export VAULT_TOKEN="$$(cat /etc/vault/bootstrap_token)"
        mkdir -p /etc/vault/bootstrap
        chmod 0700 /etc/vault/bootstrap
        sed "s|__APPROLE_NAME__|$$APPROLE_NAME|g" /etc/vault/agent.hcl > /etc/vault/bootstrap/agent.hcl
        chmod 0600 /etc/vault/bootstrap/agent.hcl
        vault read -field=role_id "auth/approle/role/$$APPROLE_NAME/role-id" > /etc/vault/bootstrap/roleid
        chmod 0600 /etc/vault/bootstrap/roleid
        vault write -wrap-ttl="$$WRAP_TTL" -force -field=wrapping_token \
          "auth/approle/role/$$APPROLE_NAME/secret-id" > /etc/vault/bootstrap/wrap_secretid
        chmod 0600 /etc/vault/bootstrap/wrap_secretid
        exec vault agent -config=/etc/vault/bootstrap/agent.hcl

volumes:
  vault-springboot4-dev-secrets:
    name: vault-springboot4-dev-secrets
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      # o: size=64m,uid=0,gid=0,mode=0777
      o: size=64m,uid=100,gid=1000,mode=0770
